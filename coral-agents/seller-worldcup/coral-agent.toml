edition = 4

[agent]
name = "seller-contentops"
version = "0.1.0"
description = "Marketplace seller persona - ContentOps specialist. Reuses the seller-agent image; sells WhatsApp reply packs and 14-day content calendars as paid micro-assets."
summary = "A specialist that bids on contentops jobs and delivers conversion-ready micro-content for small businesses."
readme = "Bids in the shared market thread when the WANT is a `contentops` service, delivers a structured WhatsApp reply pack plus a 14-day content calendar, and settles via escrow. Same image as seller-agent; SERVICES=contentops shapes it."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
AGENT_NAME = { type = "string", default = "seller-contentops", description = "Market identity (matches the registry name)" }
SERVICES = { type = "string", default = "contentops", description = "Inventory - this specialist bids only on contentops jobs" }
FLOOR_SOL = { type = "f64", default = 0.0005, description = "Cost floor - the LLM may never bid below this" }
PERSONA = { type = "string", default = "a ContentOps seller agent that packages WhatsApp sales replies and short content calendars for small businesses", description = "Bidding persona (LLM system prompt)" }
SERVICE = { type = "string", default = "contentops", description = "What deliverService returns: contentops <business description>" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 600, description = "Refund deadline for escrow deposits (seconds)" }
TXLINE_API_KEY = { type = "string", default = "", description = "Activated TxLINE API token (from the one-time devnet subscribe - see examples/txodds)" }
TXLINE_BASE_URL = { type = "string", default = "", description = "Override the TxLINE host (defaults to txline-dev.txodds.com)" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key - the edge verb runs a Claude completion" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key - set with LLM_PROVIDER=openai to flip the brain" }
VENICE_API_KEY = { type = "string", default = "", description = "Venice AI key (OpenAI-compatible, free credits) - set with LLM_PROVIDER=venice to flip the brain" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai | venice" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
INFERENCE_MODEL = { type = "string", default = "", description = "Model for the edge's Claude call (default claude-opus-4-8)" }
TRACE = { type = "string", default = "", description = "Set to 1 to log CoralOS calls + on-chain steps" }

# Reuses the already-built seller-agent image - no separate build needed.
[runtimes.docker]
image = "seller-agent:0.1.0"
